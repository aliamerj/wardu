
syntax = "proto3";

package wardu.dispatcher.v1;

option go_package = "shared/proto/dispatcher;dispatcher";

service DispatcherService {
  rpc RunJob(RunJobRequest) returns (RunJobResponse);
  rpc Heartbeat(stream HeartbeatRequest) returns (HeartbeatResponse);
}

message RunJobRequest {
 string job_id = 1;
 optional bytes payload = 2;
 optional int64 priority = 3;
 repeated string entrypoint = 4;
 optional  float idle_timeout_seconds = 5;
 optional  float max_attempts = 6;
 optional  float timeout_seconds = 7;
}

message RunJobResponse {
  string job_id = 1;
  string status = 2;
}

message HeartbeatRequest {
  string execution_id = 1;
  string job_id = 2;
  string attempt_id = 3;

  ExecutionStatus status = 4;

  int64 pid = 5;

  int64 unix_time = 6;
}

message HeartbeatResponse {
  bool accepted = 1;
}

enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;

  EXECUTION_STATUS_PENDING = 1;
  EXECUTION_STATUS_RUNNING = 2;

  EXECUTION_STATUS_SUCCEEDED = 3;
  EXECUTION_STATUS_FAILED = 4;
  EXECUTION_STATUS_CANCELLED = 5;
}

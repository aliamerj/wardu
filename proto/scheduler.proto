
syntax = "proto3";

package wardu.scheduler.v1;

option go_package = "shared/proto/scheduler;scheduler";

service SchedulerService {
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
}

message CreateJobRequest {
  string image = 1;
  bytes payload = 2;
  int64 priority = 3;
  bool autorun = 4;
  repeated string entrypoint = 5;
  float idle_timeout_seconds = 6;
  float max_attempts = 7;
  string namespace = 8;
  float timeout_seconds = 9;
}

message CreateJobResponse {
  string job_id = 1;
  string status = 2;
}
